<!DOCTYPE html>
<html lang="sk">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Môj profil</title>

   <style>
      :root {
         --purple: #8584B3;
         --purple-dark: #6b6a9a;
         --bg: #e8e8f5;
         --text: #3a3a5c;
         --text-light: #7070a0;
      }

      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         font-family: 'Trebuchet MS', sans-serif;
      }

      body {
         background: var(--bg);
         color: var(--text);
         display: flex;
         flex-direction: column;
         min-height: 100vh;
      }

      header {
         background: var(--purple);
         padding: 12px 28px;
         display: flex;
         align-items: center;
         gap: 16px;
      }

      .logo {
         font-size: 20px;
         color: #fff;
      }

      .search-box {
         flex: 1;
         max-width: 420px;
         margin: 0 auto;
      }

      .search-box input {
         width: 100%;
         padding: 8px 16px;
         border-radius: 20px;
         border: none;
         background: #f0eef8;
      }

      .header-right {
         display: flex;
         gap: 8px;
         margin-left: auto;
      }

      .header-right button {
         background: none;
         border: none;
         color: #fff;
         font-size: 20px;
         cursor: pointer;
      }

      .main {
         flex: 1;
         display: flex;
         justify-content: center;
         padding: 40px;
      }

      .profile-container {
         background: white;
         width: 100%;
         max-width: 800px;
         padding: 40px;
         border-radius: 12px;
         box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      }

      .section {
         margin-bottom: 30px;
      }

      .section h3 {
         margin-bottom: 15px;
      }

      .form-group {
         display: flex;
         flex-direction: column;
         margin-bottom: 12px;
      }

      .form-group label {
         font-size: 13px;
         margin-bottom: 4px;
         color: var(--text-light);
      }

      .form-group input {
         padding: 10px;
         border-radius: 6px;
         border: 1px solid var(--text-light);
      }

      .btn {
         padding: 12px;
         border: none;
         border-radius: 6px;
         cursor: pointer;
         font-size: 15px;
         width: 100%;
         margin-top: 10px;
      }

      .static-field {
         padding: 10px;
         border-radius: 6px;
         background: #f0eef8;
         border: 1px solid var(--text-light);
      }

      .btn-primary {
         background: var(--purple);
         color: white;
      }

      .btn-primary:hover {
         background: var(--purple-dark);
      }

      .logout-btn {
         background: #e57373;
         color: white;
      }

      .logout-btn:hover {
         background: #d32f2f;
      }

      .order {
         background: #f8f8fc;
         padding: 15px;
         border-radius: 8px;
         margin-bottom: 10px;
      }

      .order-top {
         display: flex;
         justify-content: space-between;
         margin-bottom: 8px;
         font-size: 14px;
      }

      .order-items {
         font-size: 13px;
         color: var(--text-light);
      }

      .order {
         display: flex;
         gap: 15px;
         align-items: center;
         background: #f8f8fc;
         padding: 15px;
         border-radius: 8px;
         margin-bottom: 10px;
      }

      .order img {
         width: 60px;
         height: 60px;
         object-fit: cover;
         border-radius: 8px;
      }

      .order-content {
         flex: 1;
      }

      .order-top {
         display: flex;
         justify-content: space-between;
         margin-bottom: 6px;
         font-size: 14px;
      }

      footer {
         background: #6b6a9a;
         color: white;
         text-align: center;
         padding: 24px;
         font-size: 13px;
      }
   </style>
</head>

<body>

   <header>
      <div class="logo">Mostly Sunny Toys</div>
      <div class="search-box">
         <input type="text" placeholder="Hľadať produkt...">
      </div>
      <div class="header-right">
         <button onclick="location.href='profile.html'">👤</button>
         <button onclick="location.href='cart.html'">🛒</button>
         <button onclick="location.href='index.html'">✕</button>
      </div>
   </header>

   <div class="main">
      <div class="profile-container">

         <div class="section">
            <h3>Moje údaje</h3>

            <div class="form-group">
               <label>Meno</label>
               <div class="static-field">Ján</div>
            </div>

            <div class="form-group">
               <label>Priezvisko</label>
               <div class="static-field">Novák</div>
            </div>

            <div class="form-group">
               <label>Email</label>
               <div class="static-field">jan@example.com</div>
            </div>

            <div class="form-group">
               <label>Telefón</label>
               <div class="static-field">+421 900 000 000</div>
            </div>
         </div>

         <!-- LOGOUT -->
         <button class="btn logout-btn" onclick="location.href='index.html'">Odhlásiť sa</button>

         <!-- ORDERS -->
         <div class="section" style="margin-top:30px;">
            <h3>História objednávok</h3>

            <div class="order">
               <img src="src/img/sickBear.jpg" alt="produkt">

               <div class="order-content">
                  <div class="order-top">
                     <span>Objednávka #2026001</span>
                     <span>€20.98</span>
                  </div>
                  <div class="order-items">
                     Plyšový medveď ×1
                  </div>
               </div>
            </div>

            <div class="order">
               <img src="src/img/doggie.jpg" alt="produkt">

               <div class="order-content">
                  <div class="order-top">
                     <span>Objednávka #2025998</span>
                     <span>€12.50</span>
                  </div>
                  <div class="order-items">
                     Hračka pes ×1
                  </div>
               </div>
            </div>

         </div>

      </div>
   </div>

   <footer>
      © 2026 Mostly Sunny Toys
   </footer>

</body>

</html>

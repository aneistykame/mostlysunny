<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
        --purple: #8584B3;
        --purple-light: #b8b7d8;
        --purple-dark: #6b6a9a;
        --pink: #d4a0b5;
        --pink-light: #e8c5d5;
        --bg: #e8e8f5;
        --card-bg: #f5f0f5;
        --sidebar-bg: #d8d8ee;
        --banner-1: #c8a0c8;
        --banner-2: #d4a8c0;
        --banner-3: #c0a0c8;
        --banner-4: #d8b8d0;
        --btn-bg: #b0b0c8;
        --text: #3a3a5c;
        --text-light: #7070a0;
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Trebuchet MS', sans-serif;
        }

        body{
        display:flex;
        flex-direction:column;
        min-height:100vh;
        background:var(--bg);
        }

        /* HEADER */
        header{
        background:var(--purple);
        color:white;
        text-align:center;
        padding:20px;
        font-size:24px;
        position:relative;
        box-shadow: 0 2px 12px rgba(100, 100, 180, 0.18);
        }

        /* CLOSE BUTTON */
        .close-btn{
        position:absolute;
        top:10px;
        right:15px;
        background:none;
        border:none;
        color:white;
        font-size:26px;
        cursor:pointer;
        }

        .close-btn:hover{
        opacity:0.7;
        }

        /* MAIN */
        .main-container{
        flex:1;
        display:grid;
        grid-template-columns:1fr 420px 1fr;
        align-items:center;
        }

        /* SIDE */
        .side{
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        }

        .side img{
        max-width:100%;
        opacity:0.85;
        }

        /* REGISTER BOX */
        .register-box{
        background:white;
        padding:40px;
        border-radius:12px;
        box-shadow:0 6px 20px rgba(0,0,0,0.2);
        color:var(--text);
        }

        .register-box h2{
        text-align:center;
        margin-bottom:25px;
        }

        .register-box input{
        width:100%;
        padding:12px;
        margin:8px 0;
        border:1px solid #ccc;
        border-radius:6px;
        background-color: var(--card-bg);
        color: var(--text);
        }

        /* BUTTON */
        .register-btn{
        width:100%;
        padding:12px;
        border:none;
        background:var(--purple);
        color:white;
        font-size:16px;
        border-radius:6px;
        cursor:pointer;
        margin-top:10px;
        }

        .register-btn:hover{
        background:var(--purple-dark);
        }

        /* DIVIDER */
        .divider{
        text-align:center;
        margin:20px 0;
        color:var(--text-light);
        }

        /* SOCIAL */
        .social-login{
        display:flex;
        flex-direction:column;
        gap:10px;
        color:var(--text)
        }

        .social-btn{
        padding:10px;
        border:1px solid #ccc;
        background:var(--btn-bg);
        border-radius:6px;
        cursor:pointer;
        color:var(--text)
        }

        .social-btn:hover{
        background:var(--sidebar-bg);
        }

        /* LOGIN LINK */
        .login{
        text-align:center;
        margin-top:20px;
        font-size:14px;
        color:var(--text)
        }

        .login a{
        color:var(--text-light);
        text-decoration:none;
        }

        /* FOOTER */
        footer{
        background:#6b6a9a;
        color:white;
        text-align:center;
        padding: 24px;
        font-size: 13px;
        letter-spacing: 0.5px;
        }

        /* TABLET */
        @media (max-width:900px){
            .main-container{
            grid-template-columns:1fr;
            padding:20px;
            }

            .side{
            display:none;
            }
        }
    </style>
</head>
<body>
    <header>Mostly Sunny Toys<button class="close-btn">✕</button></header>
    <div class="main-container">
        <div class="side">
            <img src="left.jpg">
        </div>
        <div class="register-box">
            <h2>Register</h2>
            <form>
                <input type="text" placeholder="Meno" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Heslo" required>
                <input type="password" placeholder="Potvrdiť heslo" required>
                <button class="register-btn">Vytvoriť účet</button>
            </form>
            <div class="divider">alebo</div>
            <div class="social-login">
                <button class="social-btn">Registrovať cez Google</button>
            </div>
            <div class="login">Máte už účet? <a href="#">Prihláste sa</a></div>
        </div>
        <div class="side">
            <img src="right.jpg">
        </div>
    </div>
    <footer>© 2026 My Website</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="mainstyle.css" rel="stylesheet">
    <title>Košík</title>
    <style>
        :root {
            --purple: #8584B3;
            --purple-dark: #6b6a9a;
            --bg: #e8e8f5;
            --card-bg: #f5f0f5;
            --text: #3a3a5c;
            --text-light: #7070a0;
            --sidebar-bg: #d8d8ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }




        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* CART CONTAINER - rovnaké ako Doprava */
        .cart-container {
            background: white;
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        .checkout-steps {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: var(--sidebar-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .item-info {
            flex: 1;
            margin-left: 15px;
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .quantity input {
            width: 60px;
            padding: 5px;
            margin-left: 5px;
            border-radius: 6px;
            border: 1px solid var(--text-light);
        }

        .price {
            font-weight: bold;
            margin-left: 15px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .total-container {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }

        .checkout-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            background: var(--purple);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .checkout-btn:hover {
            background: var(--purple-dark);
        }

        .empty-cart {
            text-align: center;
            font-size: 18px;
            color: var(--text-light);
            margin: 50px 0;
        }

        footer {
            background: #6b6a9a;
            color: white;
            text-align: center;
            padding: 24px;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .price {
                margin-top: 5px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-text" onclick="location.href='index.html'">
            Mostly Sunny Toys
        </div>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Hľadať produkty...">
        </div>
        <div class="header-icons">
            <button title="Účet" onclick="location.href='login.html'">👤 Účet</button>
            <button title="Košík" onclick="location.href='cart.html'">🛒 Košík</button>
        </div>
    </header>

    <div class="main">
        <div class="cart-container">
            <div class="checkout-steps"><b>Košík</b> → Doprava → Platba → Údaje</div>

            <div id="cart-items">
                <div class="cart-item" data-price="15.99">
                    <img src="src/img/teddy.png" class="product-img">
                    <div class="item-info">
                        <div class="product-name">Plyšový medveď</div>
                        <div class="quantity">Množstvo:
                            <input type="number" value="1" min="1">
                        </div>
                    </div>
                    <div class="price">€15.99</div>
                    <button class="remove-btn">✕</button>
                </div>
            </div>

            <div class="total-container">Spolu: €15.99</div>
            <div class="empty-cart" style="display:none;">Your cart is empty</div>

            <button class="checkout-btn" onclick="location.href='cart2.html'">Pokračovať k doprave</button>
        </div>
    </div>

    <footer>© 2026 Mostly Sunny Toys</footer>

    <script>
        const totalContainer = document.querySelector('.total-container');
        const cartItems = document.getElementById('cart-items');
        const emptyCart = document.querySelector('.empty-cart');

        function updateTotal() {
            let total = 0;
            const items = cartItems.querySelectorAll('.cart-item');
            items.forEach(item => {
                const price = parseFloat(item.dataset.price);
                const qty = parseInt(item.querySelector('input').value);
                total += price * qty;
            });
            totalContainer.textContent = `Spolu: €${total.toFixed(2)}`;

            if (items.length === 0) {
                emptyCart.style.display = 'block';
                totalContainer.style.display = 'none';
                document.querySelector('.checkout-btn').style.display = 'none';
            } else {
                emptyCart.style.display = 'none';
                totalContainer.style.display = 'block';
                document.querySelector('.checkout-btn').style.display = 'block';
            }
        }

        function addEventListeners() {
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.target.closest('.cart-item').remove();
                    updateTotal();
                });
            });

            document.querySelectorAll('.cart-item input').forEach(input => {
                input.addEventListener('change', updateTotal);
            });
        }

        addEventListeners();
        updateTotal();
    </script>
</body>

</html>

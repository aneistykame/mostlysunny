<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Košík</title>
    <style>
        :root {
            --purple: #8584B3;
            --purple-light: #b8b7d8;
            --purple-dark: #6b6a9a;
            --pink: #d4a0b5;
            --pink-light: #e8c5d5;
            --bg: #e8e8f5;
            --card-bg: #f5f0f5;
            --sidebar-bg: #d8d8ee;
            --banner-1: #c8a0c8;
            --banner-2: #d4a8c0;
            --banner-3: #c0a0c8;
            --banner-4: #d8b8d0;
            --btn-bg: #b0b0c8;
            --text: #3a3a5c;
            --text-light: #7070a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--purple);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(100, 100, 180, 0.18);
        }

        .logo {
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 20px;
            color: #fff;
            white-space: nowrap;
            text-decoration: none;
        }

        .search-box {
            flex: 1;
            max-width: 420px;
            margin: 0 auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 40px 8px 16px;
            border-radius: 20px;
            border: none;
            background: #f0eef8;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: box-shadow 0.2s;
        }

        .search-box input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
        }

        .header-right {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .header-right button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .header-right button:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* CART WINDOW */
        .cart-container {
            background: white;
            width: 100%;
            max-width: 1100px;
            min-height: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* CHECKOUT STEPS */
        .checkout-steps {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            border-bottom: 1px solid var(--text-light);
        }

        .product-cell {
            width: 100%;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .product-img {
            width: 60px;
        }

        .product-text {
            display: flex;
            flex-direction: column;
            color: var(--text)
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text)
        }

        .product-quantity input {
            width: 60px;
            padding: 4px;
            margin-left: 5px;
            color: var(--text)
        }

        .price {
            text-align: right;
            font-weight: bold;
            width: 120px;
            white-space: nowrap;
        }

        /* BUTTON */
        .checkout-btn {
            position: absolute;
            bottom: 30px;
            right: 40px;
            padding: 12px 22px;
            border: none;
            background: var(--purple);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .checkout-btn:hover {
            background: var(--purple-dark);
        }

        /* FOOTER */
        footer {
            background: #6b6a9a;
            color: white;
            text-align: center;
            padding: 24px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* TABLET */
        @media (max-width:900px) {
            .main {
                padding: 20px;
            }

            .cart-container {
                padding: 25px;
            }

            .product-info {
                flex-direction: row;
            }
        }

        /* MOBILE */
        @media (max-width:600px) {
            header {
                padding: 10px 14px;
                flex-wrap: wrap;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                flex: 1 1 100%;
            }

            .header-right {
                margin-left: 0;
            }

            .product-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .price {
                width: 100%;
                text-align: left;
                margin-top: 5px;
            }

            .checkout-btn {
                position: static;
                margin-top: 25px;
                width: 100%;
            }

            .cart-container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Mostly Sunny Toys</div>
        <div class="search-box">
            <input type="text" placeholder="Hľadať produkt...">
        </div>
        <div class="header-right">
            <button>👤</button>
            <button>🛒</button>
            <button>✕</button>
        </div>
    </header>
    <div class="main">
        <div class="cart-container">
            <div class="checkout-steps"><b>Košík</b> → Doprava → Platba → Údaje</div>
            <table>
                <tr>
                    <td class="product-cell">
                        <div class="product-info">
                            <img src="teddy.png" class="product-img">
                            <div class="product-text">
                                <div class="product-name">Plyšový medveď</div>
                                <div class="product-quantity">Množstvo:<input type="number" value="1" min="1"></div>
                            </div>
                        </div>
                    </td>
                    <td class="price">€15.99</td>
                </tr>
            </table>
            <button class="checkout-btn" onclick="location.href='cart2.html'">Pokračovať k platbe</button>
        </div>
    </div>
    <footer>© 2026 My Website</footer>
</body>

</html>

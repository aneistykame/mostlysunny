<!DOCTYPE html>
<html lang="sk">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Dodacie údaje</title>

   <style>
      :root {
         --purple: #8584B3;
         --purple-light: #b8b7d8;
         --purple-dark: #6b6a9a;
         --bg: #e8e8f5;
         --sidebar-bg: #d8d8ee;
         --text: #3a3a5c;
         --text-light: #7070a0;
      }

      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         font-family: 'Trebuchet MS', sans-serif;
      }

      body {
         background: var(--bg);
         color: var(--text);
         display: flex;
         flex-direction: column;
         min-height: 100vh;
      }

      /* HEADER */
      header {
         background: var(--purple);
         padding: 12px 28px;
         display: flex;
         align-items: center;
         gap: 16px;
         position: sticky;
         top: 0;
         z-index: 100;
         box-shadow: 0 2px 12px rgba(100, 100, 180, 0.18);
      }

      .logo {
         font-size: 20px;
         color: #fff;
      }

      .search-box {
         flex: 1;
         max-width: 420px;
         margin: 0 auto;
      }

      .search-box input {
         width: 100%;
         padding: 8px 16px;
         border-radius: 20px;
         border: none;
         background: #f0eef8;
         font-size: 14px;
         outline: none;
      }

      .header-right {
         display: flex;
         gap: 8px;
         margin-left: auto;
      }

      .header-right button {
         background: none;
         border: none;
         color: #fff;
         font-size: 20px;
         cursor: pointer;
         padding: 4px 6px;
         border-radius: 8px;
      }

      .header-right button:hover {
         background: rgba(255, 255, 255, 0.18);
      }

      /* MAIN */
      .main {
         flex: 1;
         display: flex;
         justify-content: center;
         align-items: center;
         padding: 40px;
      }

      /* CONTAINER */
      .cart-container {
         background: white;
         width: 100%;
         max-width: 1100px;
         padding: 40px;
         border-radius: 12px;
         box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      }

      .checkout-steps {
         font-size: 14px;
         color: var(--text-light);
         margin-bottom: 25px;
      }

      /* LAYOUT */
      .checkout-layout {
         display: flex;
         gap: 40px;
      }

      /* FORM */
      .form-section {
         flex: 2;
      }

      .form-grid {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 15px;
      }

      .form-group {
         display: flex;
         flex-direction: column;
      }

      .form-group.full {
         grid-column: 1 / 3;
      }

      label {
         font-size: 13px;
         margin-bottom: 5px;
         color: var(--text-light);
      }

      input {
         padding: 10px;
         border-radius: 6px;
         border: 1px solid var(--text-light);
         font-size: 14px;
      }

      /* SUMMARY */
      .cart-summary {
         flex: 1;
         background: var(--sidebar-bg);
         padding: 20px;
         border-radius: 10px;
      }

      .summary-title {
         font-weight: bold;
         margin-bottom: 15px;
      }

      .summary-item {
         display: flex;
         justify-content: space-between;
         margin-bottom: 10px;
         font-size: 14px;
      }

      .summary-total {
         border-top: 1px solid var(--text-light);
         padding-top: 10px;
         margin-top: 10px;
         font-weight: bold;
      }

      /* BUTTON */
      .checkout-btn {
         margin-top: 25px;
         width: 100%;
         padding: 12px;
         border: none;
         background: var(--purple);
         color: white;
         border-radius: 6px;
         cursor: pointer;
         font-size: 16px;
      }

      .checkout-btn:hover {
         background: var(--purple-dark);
      }

      /* MOBILE */
      @media(max-width:800px) {
         .checkout-layout {
            flex-direction: column;
         }

         .form-grid {
            grid-template-columns: 1fr;
         }

         .form-group.full {
            grid-column: auto;
         }
      }

      footer {
         background: #6b6a9a;
         color: white;
         text-align: center;
         padding: 24px;
         font-size: 13px;
      }
   </style>
</head>
<body>

   <header>
      <div class="logo">Mostly Sunny Toys</div>
      <div class="search-box">
         <input type="text" placeholder="Hľadať produkt...">
      </div>
      <div class="header-right">
         <button>👤</button>
         <button>🛒</button>
         <button>✕</button>
      </div>
   </header>

   <div class="main">
      <div class="cart-container">

         <div class="checkout-steps">
            Košík → Doprava → Platba → <b>Údaje</b>
         </div>

         <div class="checkout-layout">

            <!-- LEFT FORM -->
            <div class="form-section">
               <h3 style="margin-bottom:20px;">Dodacie údaje</h3>
               <form>
                  <div class="form-grid">

                     <div class="form-group">
                        <label>Meno</label>
                        <input type="text">
                     </div>

                     <div class="form-group">
                        <label>Priezvisko</label>
                        <input type="text">
                     </div>

                     <div class="form-group full">
                        <label>Email</label>
                        <input type="email">
                     </div>

                     <div class="form-group full">
                        <label>Telefón</label>
                        <input type="tel">
                     </div>

                  </div>

                  <button class="checkout-btn">
                     Dokončiť objednávku
                  </button>
               </form>
            </div>

            <!-- RIGHT SUMMARY -->
            <div class="cart-summary">
               <div class="summary-title">Tvoj košík</div>
               <div class="summary-item">
                  <span>Plyšový medveď ×1</span>
                  <span>€15.99</span>
               </div>
               <div class="summary-item">
                  <span>Doprava</span>
                  <span>€4.99</span>
               </div>
               <div class="summary-total">
                  <span>Spolu</span>
                  <span>€20.98</span>
               </div>
            </div>

         </div>
      </div>
   </div>

   <footer>
      © 2026 My Website
   </footer>

</body>

</html>
